<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_shared.css">
  <style>
    .hero-flow {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      margin-top: 6pt; gap: 14pt;
    }
    .flow-img {
      width: 100%; max-width: 560pt;
      height: auto;
      opacity: 0.95;
    }
    .screen-strip {
      display: flex; gap: 10pt; justify-content: center;
      align-items: flex-end;
    }
    .screen-strip img {
      height: 150pt; border-radius: 11pt;
      box-shadow: 0 6pt 24pt rgba(123,45,142,0.22);
      border: 1.5pt solid rgba(255,255,255,0.8);
    }
    .screen-strip img {
      height: 210pt;
    }
    .screen-labels {
      display: flex; gap: 10pt; justify-content: center;
      font-size: 8.5pt; color: #4A3860; font-weight: 500;
      letter-spacing: 0.5pt;
    }
    .screen-labels > div {
      width: 102pt; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 4pt;
    }
    .prompt-tag {
      display: inline-block; padding: 2pt 5pt;
      background: linear-gradient(135deg, #7B2D8E, #D946A8);
      color: #fff; border-radius: 5pt;
      font-size: 6.5pt; font-weight: 700; letter-spacing: 0.8pt;
    }
    .arrow { color: #D946A8; font-weight: 600; }
  </style>
</head>
<body>
  <div class="slide-top">
    <div class="brand-small"><div class="brand-dot-small"></div>BLOOMHER</div>
    <span class="challenge-chip">CHALLENGE · SOLUTION</span>
  </div>

  <p class="kicker-label">THE SOLUTION</p>
  <h1 class="slide-title">Three prompts. <em style="font-family:Fraunces;font-style:italic;color:#D946A8;">Five screens.</em> One growth loop.</h1>
  <p class="slide-subtitle">
    Every daily input flows through a chain of engineered prompts, building passive self-awareness over time.
  </p>

  <div class="hero-flow">
    <div class="screen-strip">
      <img src="assets/01_home_chat.png" alt="Chat screen"/>
      <img src="assets/02_garden.png" alt="Garden screen"/>
      <img src="assets/03_skills.png" alt="Skills screen"/>
      <img src="assets/04_weekly.png" alt="Weekly screen"/>
      <img src="assets/06_starl_result_top.png" alt="STAR(L) screen"/>
    </div>
    <div class="screen-labels">
      <div><span class="prompt-tag">P1</span> Chat <span class="arrow">→</span></div>
      <div><span class="leaf">🌱</span> Garden <span class="arrow">→</span></div>
      <div><span class="leaf">🌷</span> Skills <span class="arrow">→</span></div>
      <div><span class="prompt-tag">P2</span> Weekly <span class="arrow">→</span></div>
      <div><span class="prompt-tag">P3</span> STAR(L)</div>
    </div>
  </div>

  <div class="slide-footer">
    <span>SLIDE 04 · SOLUTION OVERVIEW</span>
    <span class="page-num-small">04 / 15</span>
  </div>
</body>
</html>
